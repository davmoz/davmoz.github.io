baseURL = 'https://davmoz.github.io/'
languageCode = 'en-us'
title = 'davmoz'
theme = 'PaperMod'

[params]
  description = 'Personal tech blog'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = 'auto'
  math = true

  author = 'davmoz'

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/davmoz"

[outputs]
  home = ["HTML", "RSS", "JSON"]
